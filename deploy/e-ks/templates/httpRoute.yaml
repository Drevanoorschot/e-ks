{{- if .Values.gatewayApi.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: eks-http
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: traefik
      namespace: ingress
      sectionName: web
      kind: Gateway

  hostnames:
    - {{ include "fullHostname" . }}

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: eks-https
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: traefik
      sectionName: websecure
      namespace: ingress
      kind: Gateway

  hostnames:
    - {{ include "fullHostname" . }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /lookup
        - path:
            type: PathPrefix
            value: /suggest

      backendRefs:
        - name: bag-lookup
          port: 80

    - matches:
        - path:
            type: PathPrefix
            value: /

      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: security-headers

      backendRefs:
        - name: eks
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: {{ .Release.Namespace }}
spec:
  headers:
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsSeconds: 31536000
    stsPreload: false # in production, we should consider setting this to true
{{- end }}
