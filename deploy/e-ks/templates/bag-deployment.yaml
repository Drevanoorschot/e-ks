apiVersion: apps/v1
kind: Deployment
metadata:
  name: bag-lookup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: bag-lookup
    app.kubernetes.io/part-of: eks
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/component: bag
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bag-lookup
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bag-lookup
        app.kubernetes.io/version: {{ .Chart.AppVersion }}
        ingress-controller-frontoffice-policy: allow
    spec:
      automountServiceAccountToken: false
      containers:
        - name: bag-lookup
          image: "{{ .Values.bag.image }}:{{ .Values.bag.version }}"
          ports:
            - containerPort: 8080
              name: http
          resources:
            limits:
              memory: "256Mi"
            requests:
              cpu: "10m"
              memory: "128Mi"
              ephemeral-storage: "512Mi"

