{{- if .Values.typst.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: typst
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: typst
    app.kubernetes.io/part-of: eks
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/component: typst
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: typst
  template:
    metadata:
      labels:
        app.kubernetes.io/name: typst
        app.kubernetes.io/version: {{ .Chart.AppVersion }}
        tier: vertrouwd
    spec:
      automountServiceAccountToken: false
      containers:
        - name: typst
          imagePullPolicy: Always
          image: "{{ .Values.typst.image }}:{{ .Chart.AppVersion }}"
          ports:
            - containerPort: 8080
              name: http
          resources:
            limits:
              memory: "1024Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "265Mi"
{{- end }}
