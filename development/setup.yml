tools:
  - name: esbuild
    # https://github.com/evanw/esbuild/releases
    version: "0.27.3"
    base_url: "https://registry.npmjs.org/@esbuild"
  - name: biome
    # https://github.com/biomejs/biome/releases
    version: "2.4.2"
    base_url: "https://github.com/biomejs/biome/releases/download/@biomejs/biome@"
  - name: bag-service
    # https://github.com/tweedegolf/bag-address-lookup/releases
    version: "0.3.4"
    base_url: "https://github.com/tweedegolf/bag-address-lookup/releases/download"
commands:
  docker_compose_rm:
    command: docker
    args:
      - compose
      - rm
      - --force
      - --volumes
  docker_compose_up:
    command: docker
    args:
      - compose
      - up
      - --quiet-pull
      - --detach
  build_djlint_docker_image:
    command: docker
    args:
      - build
      - --build-arg
      - UID=__UID__
      - --build-arg
      - GID=__GID__
      - -f
      - development/djlint.Dockerfile
      - -t
      - djlint
      - .
  esbuild_bundle:
    command: ./bin/esbuild
    args:
      - --bundle
      - frontend/index.ts
      - --outdir=frontend/static
      - --minify
      - --sourcemap
      - --define:IS_PRODUCTION=true
      - --loader:.woff2=file
      - --loader:.svg=file
      - --public-path=/static/
  load_fixtures:
    command: cargo
    args:
      - run
      - --features
      - fixtures
      - --bin
      - fixtures
  install_cargo_watch:
    command: cargo
    args:
      - install
      - cargo-watch
      - --locked
  install_cargo_sqlx:
    command: cargo
    args:
      - install
      - sqlx-cli
      - --no-default-features
      - --features
      - postgres
      - --locked
  migrate_database:
    command: cargo
    args:
      - sqlx
      - database
      - reset
      - -y
      - --force
      - --database-url
      - postgres://eks@localhost/eks
