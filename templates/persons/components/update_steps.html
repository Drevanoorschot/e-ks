<div class="steps-nav">
  <ul>
    <li>
      <a href="{{ person.update_path() }}" class="{% if person.is_personal_info_complete() %}ok{% else %}warning{% endif %}">
        {{ "person.personal_details"|trans }}
      </a>
    </li>
    {% if person.lives_in_nl() %}
    <li>
      <a href="{{ person.update_address_path() }}" class="{% if person.address.is_complete() %}ok{% else if should_warn|default(true) %}warning{% endif %}">
        {{ "person.correspondence_address"|trans }}
      </a>
    </li>
    {% else %}
    <li>
      <a href="{{ person.update_representative_path() }}" class="{% if person.is_representative_complete() %}ok{% else if should_warn|default(true) %}warning{% endif %}">
        {{ "person.representative"|trans }}
      </a>
    </li>
    {% endif %}
  </ul>
</div>
