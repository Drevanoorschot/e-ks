services:
  playwright:
    build:
      dockerfile: docker/playwright.Dockerfile
    volumes:
      - ./tests:/app/tests
      - ./playwright-report:/app/playwright-report
      - ../frontend:/frontend:ro
    environment:
      PLAYWRIGHT_TEST_BASE_URL: http://application:3000
    depends_on:
      - application
    networks: [pw_network]
    
  psql:
    image: ghcr.io/tweedegolf/postgres:18
    command: ["postgres", "-c", "log_min_messages=fatal"]
    environment:
      POSTGRES_USER: eks
      POSTGRES_DB: eks
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: Europe/Amsterdam
    networks: [pw_network]

  application:
    image: debian:bookworm-slim
    working_dir: /app
    volumes:
      - ../target/release/eks:/app/eks:ro
    command: ["/app/eks"]
    environment:
      DATABASE_URL: postgres://eks@psql:5432/eks
      BAG_SERVICE_URL: http://bag-service:8080
      LOAD_FIXTURES: "true"
    depends_on:
      - psql
      - bag-service
    networks: [pw_network]

  bag-service:
    image: ghcr.io/tweedegolf/bag-address-lookup:0.3.2
    networks: [pw_network]

networks:
  pw_network:
    name: pw_network
