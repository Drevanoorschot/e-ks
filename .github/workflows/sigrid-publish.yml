name: Sigrid Publish

permissions:
  contents: read
concurrency:
  group: 
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-sigrid-publish
  cancel-in-progress: true

on:
  push:
    branches:
      - main

jobs:
  sigridci:
    name: Sigrid CI
    if: github.repository == 'kiesraad/e-ks'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Sigrid CI
        uses: Software-Improvement-Group/sigridci@372aaf69995692ca9c2a54c93623bed8a33c5d46 # main
        with:
          customer: kiesraad
          system: e-ks
          convert: rust
          publishonly: true
          exclude: deploy,playwright,validate,frontend/styles,src/fixtures,locales
        env:
          SIGRID_CI_TOKEN: "${{ secrets.SIGRID_CI_TOKEN }}"
