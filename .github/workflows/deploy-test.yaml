name: Deploy to test environment
run-name: 'Deploy "${{ github.ref_name }}" to test environment'

on:
  workflow_dispatch:

jobs:
  rust:
    name: Build rust code
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}
      branch-name: ${{ steps.branch-name.outputs.branch-name }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6

      - name: Create version tag
        id: create-tag
        shell: bash
        run: |
          export tag=$(git show -s --format="%ct-%h" $GITHUB_SHA)
          echo "tag=$tag" >> $GITHUB_ENV
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Canonical branch name
        id: branch-name
        shell: bash
        run: |
          branch_name_without_prefix=${GITHUB_REF#refs/heads/}
          
          # Replace all remaining forward slashes '/' and underscores with hyphens '-'
          canonical_branch_name=$(echo "$branch_name_without_prefix" | sed 's/[\/_]/-/g')
          
          # Set the output variable
          echo "branch-name=$canonical_branch_name" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        shell: bash
        run: >
          rustup update stable &&
          rustup default stable &&
          rustup target add x86_64-unknown-linux-musl

      - name: Cargo cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: eks

      - name: Tools cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: bin
          key: tools-cache-v1-${{ runner.os }}-${{ hashFiles('development/Cargo.toml', 'development/src/*.rs', 'development/*.yml') }}

      - name: Setup esbuild
        run: bin/init esbuild

      - name: Build e-ks
        run: ./bin/build --target x86_64-unknown-linux-musl

      - run: find . -name "eks"

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: target
          if-no-files-found: 'error'
          path: target/release/eks


  build-docker:
    name: Build Docker containers
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    needs: rust
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Download rust binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: target
          path: target/release

      - name: Build and push eks docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          file: deploy/eks.Dockerfile
          push: true
          build-args: "version=${{ needs.rust.outputs.tag }}"
          context: target/release
          tags: "ghcr.io/kiesraad/e-ks/eks:${{ needs.rust.outputs.tag }}"

      - name: Build and push db docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          file: deploy/db.Dockerfile
          push: true
          build-args: "version=${{ needs.rust.outputs.tag }}"
          context: target/release
          tags: "ghcr.io/kiesraad/e-ks/db:${{ needs.rust.outputs.tag }}"

      - name: Build and push typst docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          file: deploy/typst.Dockerfile
          push: true
          build-args: "version=${{ needs.rust.outputs.tag }}"
          context: models
          tags: "ghcr.io/kiesraad/e-ks/typst:${{ needs.rust.outputs.tag }}"

  helm:
    name: Install with Helm
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    env:
      KUBECONFIG: ${{ github.workspace }}/kubeconfig
      KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
    environment:
      url: https://${{ needs.rust.outputs.branch-name }}.kiesraad.net
      name: staging
    needs: [ build-docker, rust ]
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6

      - name: Install Helm
        run: "curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4 | bash"

      - name: Create kubeconfig file
        run: echo "${KUBECONFIG_CONTENT}" > ${{ github.workspace }}/kubeconfig

      - name: Set the current version in the Helm chart
        uses: mikefarah/yq@5a7e72a743649b1b3a47d1a1d8214f3453173c51 # v4
        with:
          cmd: yq -i '.appVersion="${{ needs.rust.outputs.tag }}"' deploy/e-ks/Chart.yaml

      - name: Create namespace
        shell: bash
        run: |
          # create new namespace if it does not exist already
          kubectl get namespace ${{ needs.rust.outputs.branch-name }} || {
            kubectl create ns ${{ needs.rust.outputs.branch-name }}
          }
      - name: Install application
        working-directory: deploy
        run: |
          helm upgrade --install e-ks ./e-ks --namespace ${{ needs.rust.outputs.branch-name }} \
            --set subdomain="${{ needs.rust.outputs.branch-name }}" \
            --set db.setup=true \
            --set db.erase=true \
            --set db.runMigrations=true \
            --set db.password=${PGPASSWORD} \
            --set gatewayApi.enabled=true
