name: Sigrid PR Feedback

permissions: {}
concurrency:
  group: 
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-sigrid-pr-feedback
  cancel-in-progress: true

on:
  pull_request:

jobs:
  sigridci:
    name: Sigrid CI
    if: "!github.event.pull_request.head.repo.fork"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # to add a comment with the sigrid results
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Sigrid CI
        uses: Software-Improvement-Group/sigridci@6ee277f15356ce2203b3c3408c315bf12663f652 # main
        with:
          customer: kiesraad
          system: e-ks
          convert: rust
          exclude: deploy,playwright,validate,frontend/styles,src/fixtures,locales
        env:
          SIGRID_CI_TOKEN: "${{ secrets.SIGRID_CI_TOKEN }}"

      - name: "Sigrid PR feedback"
        uses: mshick/add-pr-comment@b8f338c590a895d50bcbfa6c5859251edc8952fc # v2
        if: always()
        with:
          message-id: sigrid
          message-path: sigrid-ci-output/feedback.md
